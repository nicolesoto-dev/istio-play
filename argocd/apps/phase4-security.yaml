apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudmart-phase4-security
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/nicolesoto-dev/istio-play
    targetRevision: HEAD
    path: k8s/istio/phase4-security
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
