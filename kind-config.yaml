kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: cloudmart

nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    protocol: TCP
  - containerPort: 30080 # Kiali
    hostPort: 30080
    protocol: TCP
  - containerPort: 30090 # Grafana
    hostPort: 30090
    protocol: TCP
  - containerPort: 30091 # Jaeger
    hostPort: 30091
    protocol: TCP
  - containerPort: 30092 # Prometheus
    hostPort: 30092
    protocol: TCP

- role: worker
  labels:
    topology.kubernetes.io/zone: zone-a

- role: worker
  labels:
    topology.kubernetes.io/zone: zone-b
