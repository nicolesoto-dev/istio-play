apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-svc
      version: v1
  template:
    metadata:
      labels:
        app: inventory-svc
        version: v1
    spec:
      serviceAccountName: inventory-svc
      containers:
      - name: inventory-svc
        image: cloudmart/inventory-svc:v1
        imagePullPolicy: IfNotPresent
        env:
        - name: SLOW_MODE
          value: "false"
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-svc
spec:
  selector:
    app: inventory-svc
  ports:
  - port: 8080
    targetPort: 8080
