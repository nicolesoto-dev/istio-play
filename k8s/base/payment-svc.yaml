apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-svc
      version: v1
  template:
    metadata:
      labels:
        app: payment-svc
        version: v1
    spec:
      serviceAccountName: payment-svc
      containers:
      - name: payment-svc
        image: cloudmart/payment-svc:v1
        imagePullPolicy: IfNotPresent
        env:
        - name: ERROR_RATE
          value: "0.2"
        - name: SLOW_RATE
          value: "0.3"
        - name: SLOW_MIN
          value: "2.0"
        - name: SLOW_MAX
          value: "3.0"
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-svc
spec:
  selector:
    app: payment-svc
  ports:
  - port: 8080
    targetPort: 8080
