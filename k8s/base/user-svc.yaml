apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-svc
      version: v1
  template:
    metadata:
      labels:
        app: user-svc
        version: v1
    spec:
      serviceAccountName: user-svc
      containers:
      - name: user-svc
        image: cloudmart/user-svc:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-svc
spec:
  selector:
    app: user-svc
  ports:
  - port: 8080
    targetPort: 8080
