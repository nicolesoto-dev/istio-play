apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-svc
      version: v1
  template:
    metadata:
      labels:
        app: product-svc
        version: v1
    spec:
      serviceAccountName: product-svc
      containers:
      - name: product-svc
        image: cloudmart/product-svc:v1
        imagePullPolicy: IfNotPresent
        env:
        - name: VERSION
          value: "v1"
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-svc-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-svc
      version: v2
  template:
    metadata:
      labels:
        app: product-svc
        version: v2
    spec:
      serviceAccountName: product-svc
      containers:
      - name: product-svc
        image: cloudmart/product-svc:v2
        imagePullPolicy: IfNotPresent
        env:
        - name: VERSION
          value: "v2"
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-svc
spec:
  selector:
    app: product-svc
  ports:
  - port: 8080
    targetPort: 8080
